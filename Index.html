<style>

    body{
       animation: party 2s linear infinite; 
       background-image: url("crazyyy.webp");
    }

    @keyframes party {
        0% { background-color: rgb(255, 0, 0); }
        25% { background-color: rgb(0, 21, 255); }
        50% { background-color: rgb(72, 255, 0); }
        75% { background-color: rgb(174, 0, 255); }
        100% { background-color: rgb(255, 238, 0); }
    }

    h1 {
        color: white;
        text-align: center;
        text-shadow: border;
        font-size: 3em;
        margin-top: 2%;
        animation: wobble 1s infinite linear;
    }

    @keyframes wobble {
    0%   { transform: rotate(0deg) scale(1); }
    20%  { transform: rotate(-8deg) scale(1.1); }
    40%  { transform: rotate(8deg) scale(0.9); }
    60%  { transform: rotate(-8deg) scale(1.1); }
    80%  { transform: rotate(8deg) scale(0.95); }
    100% { transform: rotate(0deg) scale(1); }

    }
    .cat {
        display: block;
        margin: 0 auto;
        width: 600px;
        height: auto;
        animation: dance 1s infinite;
    }

    @keyframes dance {
        0%   { transform: translateY(0) scale(1) rotate(0deg) scaleX(1);}
        25%  { transform: translateY(-20px) scale(1.05) rotate(-5deg) scaleX(-1);}
        50%  { transform: translateY(0) scale(1) rotate(5deg) scaleX(-1);}
        75%  { transform: translateY(-20px) scale(1.05) rotate(-5deg) scaleX(1);}
        100% { transform: translateY(0) scale(1) rotate(0deg) scaleX(1);}
    }

    .cat2 {
        position:absolute;
        display: block;
        margin: 0 auto;
        top: 150;   
        left: 150;    
        width: 300px;
        height: auto;
        animation: dance 1s infinite;
    }

    .cat3 {
        position:absolute;
        display: block;
        margin: 0 auto;
        top: 150;   
        right: 100;
        width: 400px;
        height: auto;
        animation: dance 1s infinite;
    }

</style>

<head>
    <title> KITTEN </title>
</head>

<body>
    <h1>Dedelalala</h1>
    <img src="dancing catu.webp" alt ="Gato Dansante" class="cat">
    <img src="cat2.png" alt ="Gato Dansante 2" class="cat2">
    <img src="meow3.png" alt ="Gato Dansante 3" class="cat3">
    <audio src="wewe.mp3"autoplay></audio>   
</body>
